name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile engine/src/pipe.py engine/src/parsing.py engine/src/cli.py engine/__init__.py

      - name: Python regression tests
        run: python -m unittest engine.tests.test_regressions

      - name: Rust check
        run: cargo check --manifest-path service/Cargo.toml

      - name: Rust tests
        run: cargo test --manifest-path service/Cargo.toml
